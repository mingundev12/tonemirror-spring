# applicaion.properties
spring.application.name=tonemirror-spring

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/tonemirror}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.max-file-size=10MB

# ?? ??? ??
file.upload-dir=${IMAGE_PATH:/app/storage}
file.base-url=http://localhost:28282/storage

# M2M ??? ?? ?? ?? ??
m2m.fastapi-url=${FASTAPI_URL:http://fastapi-server:8000/ai}